<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin — ICECH</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
</head>
<body>
    <!-- Admin Panel -->
    <div class="admin-overlay" id="adminOverlay">
        <!-- Login Modal -->
        <div class="admin-login" id="adminLogin">
            <div class="admin-login__card">
                <span class="material-icons-outlined admin-login__icon">lock</span>
                <h2 class="admin-login__title">Acceso Administrador</h2>
                <div class="admin-login__field">
                    <input type="password" id="adminPassword" class="form-input" placeholder="Ingrese la contraseña" onkeydown="if(event.key==='Enter') adminLogin()">
                    <p id="adminPasswordError" class="form-error">Contraseña incorrecta</p>
                </div>
                <div class="admin-login__actions">
                    <button type="button" class="btn btn--primary" onclick="adminLogin()">
                        <span class="material-icons-outlined">login</span> Entrar
                    </button>
                    <button type="button" class="btn btn--secondary" onclick="window.location.href='index.html'">
                        <span class="material-icons-outlined">close</span> Cancelar
                    </button>
                </div>
            </div>
        </div>

        <!-- Admin Dashboard -->
        <div class="admin-dashboard" id="adminDashboard" style="display: none;">
            <div class="admin-dashboard__header">
                <h2 class="admin-dashboard__title">
                    <span class="material-icons-outlined">dashboard</span>
                    Panel de Administración
                </h2>
                <div class="admin-dashboard__actions">
                    <button type="button" class="btn btn--secondary btn--sm" onclick="loadAdminData()">
                        <span class="material-icons-outlined">refresh</span> Actualizar
                    </button>
                    <button type="button" class="btn btn--exit btn--sm" onclick="window.location.href='index.html'">
                        <span class="material-icons-outlined">logout</span> Salir
                    </button>
                </div>
            </div>
            <div class="admin-dashboard__stats" id="adminStats"></div>
            <div class="admin-dashboard__search">
                <span class="material-icons-outlined">search</span>
                <input type="text" id="adminSearch" class="form-input" placeholder="Buscar por nombre, apellido, comuna..." oninput="filterAdminTable()">
            </div>
            <div class="admin-table-wrapper">
                <table class="admin-table" id="adminTable">
                    <thead id="adminTableHead"></thead>
                    <tbody id="adminTableBody"></tbody>
                </table>
                <div class="admin-empty" id="adminEmpty" style="display: none;">
                    <span class="material-icons-outlined">inbox</span>
                    <p>No hay registros</p>
                </div>
                <div class="admin-loading" id="adminLoading">
                    <div class="loading-spinner"></div>
                    <p>Cargando registros...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Editar Registro -->
    <div class="modal-overlay" id="editModal" style="display: none;">
        <div class="modal-card">
            <div class="modal-header">
                <h3><span class="material-icons-outlined">edit</span> Editar Registro</h3>
                <button type="button" class="btn-icon" onclick="closeEditModal()">
                    <span class="material-icons-outlined">close</span>
                </button>
            </div>
            <div class="modal-body" id="editModalBody"></div>
            <div class="modal-footer">
                <button type="button" class="btn btn--primary" onclick="saveEditedRecord()">
                    <span class="material-icons-outlined">save</span> Guardar
                </button>
                <button type="button" class="btn btn--secondary" onclick="closeEditModal()">
                    Cancelar
                </button>
            </div>
        </div>
    </div>

    <!-- Modal Confirmar Eliminar -->
    <div class="modal-overlay" id="deleteModal" style="display: none;">
        <div class="modal-card modal-card--sm">
            <div class="modal-header modal-header--danger">
                <h3><span class="material-icons-outlined">warning</span> Confirmar Eliminación</h3>
            </div>
            <div class="modal-body">
                <p>¿Está seguro de que desea eliminar este registro?</p>
                <p class="modal-record-name" id="deleteRecordName"></p>
                <p class="modal-warning">Esta acción no se puede deshacer.</p>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn--danger" onclick="confirmDelete()">
                    <span class="material-icons-outlined">delete</span> Eliminar
                </button>
                <button type="button" class="btn btn--secondary" onclick="closeDeleteModal()">
                    Cancelar
                </button>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        // Auto-focus en el campo de contraseña al cargar
        document.addEventListener('DOMContentLoaded', function () {
            document.getElementById('adminPassword').focus();
        });
    </script>
</body>
</html>
